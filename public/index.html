<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>واتساب ويب - QR</title>
    <style>
        body { background: #075e54; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 16px; text-align: center; width: 350px; }
        #qr-img img { width: 250px; height: 250px; }
        .chat-box { height: 300px; overflow-y: auto; background: #e5ddd5; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: left; }
        .message { background: #dcf8c5; padding: 8px; border-radius: 12px; margin: 5px; display: inline-block; }
        input, textarea { width: 100%; margin: 5px 0; padding: 8px; border-radius: 20px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #25d366; border: none; padding: 10px; border-radius: 24px; color: white; font-weight: bold; width: 100%; cursor: pointer;}
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="login" class="container">
    <h2>امسح رمز QR</h2>
    <div id="qr-img">⏳ جاري تجهيز الباركود...</div>
    <p id="status">جاري الاتصال...</p>
    <button onclick="location.reload()">تحديث</button>
</div>
<div id="chat" class="container hidden">
    <h3>محادثة واتساب والرسائل الجماعية</h3>
    <div id="messages" class="chat-box"></div>
    <input type="text" id="phone" placeholder="الأرقام (افصل بينها بفاصلة. مثال: 9665.., 9665..)" dir="ltr">
    <textarea id="msg" placeholder="اكتب رسالتك هنا..."></textarea>
    <button id="send">إرسال للكل</button>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const login = document.getElementById('login');
    const chat = document.getElementById('chat');
    const qrDiv = document.getElementById('qr-img');
    const statusP = document.getElementById('status');
    const messagesDiv = document.getElementById('messages');

    socket.on('qr', (imgData) => {
        login.style.display = 'block';
        chat.classList.add('hidden');
        qrDiv.innerHTML = `<img src="${imgData}" style="width:250px">`;
        statusP.innerText = 'امسح الباركود من واتساب (الإعدادات > الأجهزة المرتبطة)';
    });

    socket.on('ready', () => {
        login.style.display = 'none';
        chat.classList.remove('hidden');
    });

    socket.on('message', (msg) => {
        const el = document.createElement('div');
        el.className = 'message';
        el.innerText = `${msg.from.split('@')[0]}: ${msg.body}`;
        messagesDiv.appendChild(el);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    socket.on('message-sent', (data) => {
        const el = document.createElement('div');
        el.className = 'message';
        el.style.background = '#dcf8c5';
        el.innerText = `أنت → ${data.to}: ${data.body}`;
        messagesDiv.appendChild(el);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        document.getElementById('msg').value = '';
    });

    socket.on('error', (err) => alert(err));

    document.getElementById('send').onclick = () => {
        const to = document.getElementById('phone').value.trim();
        const body = document.getElementById('msg').value.trim();
        if (!to || !body) return alert('أدخل الرقم/الأرقام والرسالة');
        socket.emit('send-message', { to, body });
    };
</script>
</body>
</html>

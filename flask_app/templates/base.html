<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}راصد حراج{% endblock %}</title>

  <!-- Bootstrap 5 RTL -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <!-- Google Fonts Cairo -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --primary: #1a6b3a;
      --primary-light: #22c55e;
      --primary-dark: #134d29;
      --accent: #f59e0b;
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --info: #3b82f6;
      --sidebar-w: 260px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
    }

    a { text-decoration: none; color: inherit; }

    .navbar-brand {
      font-size: 1.4rem;
      font-weight: 800;
      color: white !important;
    }

    .navbar-brand span { color: var(--accent); }

    .card {
      border: none;
      border-radius: 16px;
      box-shadow: var(--shadow);
      background: var(--card-bg);
    }

    .card-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-radius: 16px 16px 0 0 !important;
      padding: 16px 24px;
      font-weight: 700;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      padding: 10px 24px;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26,107,58,0.4);
    }

    .btn-danger { border-radius: 10px; font-weight: 600; }
    .btn-warning { border-radius: 10px; font-weight: 600; }
    .btn-success { border-radius: 10px; font-weight: 600; }
    .btn-info { border-radius: 10px; font-weight: 600; }
    .btn-secondary { border-radius: 10px; font-weight: 600; }

    .form-control, .form-select {
      border-radius: 10px;
      border: 1.5px solid var(--border);
      padding: 10px 14px;
      font-family: 'Cairo', sans-serif;
      transition: border-color 0.2s;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,107,58,0.1);
    }

    .badge { font-family: 'Cairo', sans-serif; font-weight: 600; padding: 6px 12px; border-radius: 8px; }

    .alert { border-radius: 12px; font-weight: 500; }

    .table { --bs-table-bg: transparent; }
    .table th { font-weight: 700; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
    .table td { vertical-align: middle; }

    .pagination .page-link {
      border-radius: 8px !important;
      margin: 0 2px;
      border: 1.5px solid var(--border);
      color: var(--primary);
      font-weight: 600;
    }
    .pagination .page-item.active .page-link {
      background: var(--primary);
      border-color: var(--primary);
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      border-right: 4px solid var(--primary);
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); }
    .stat-card .icon { font-size: 2.5rem; opacity: 0.15; }
    .stat-card .value { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .stat-card .label { color: var(--text-muted); font-size: 0.9rem; }

    .status-active { color: var(--success); }
    .status-paused { color: var(--warning); }
    .status-expired { color: var(--danger); }

    .radar-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .radar-status-badge.active {
      background: rgba(34,197,94,0.1);
      color: #16a34a;
    }
    .radar-status-badge.paused {
      background: rgba(245,158,11,0.1);
      color: #d97706;
    }

    .pulse {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
      70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    /* Tag Input */
    .tag-input-container {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      min-height: 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      cursor: text;
      background: white;
      transition: border-color 0.2s;
    }
    .tag-input-container:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,107,58,0.1); }
    .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--primary); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; }
    .tag .remove-tag { cursor: pointer; opacity: 0.8; }
    .tag .remove-tag:hover { opacity: 1; }
    .tag-input { border: none; outline: none; font-family: 'Cairo', sans-serif; font-size: 0.9rem; min-width: 120px; flex: 1; }

    .footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .stat-card .value { font-size: 1.5rem; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>

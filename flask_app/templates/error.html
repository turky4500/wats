{% extends "base.html" %}
{% block title %}خطأ {{ code }} - راصد حراج{% endblock %}

{% block extra_css %}
<style>
  body { background: linear-gradient(135deg, #f0f4f8 0%, #e8f4fd 100%); min-height: 100vh; display: flex; align-items: center; }
  .error-card { max-width: 500px; margin: auto; text-align: center; }
  .error-code { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, #1a6b3a, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
</style>
{% endblock %}

{% block body %}
<div class="container">
  <div class="error-card">
    <div class="error-code">{{ code }}</div>
    <h3 class="fw-700 mt-2 mb-3">{{ message }}</h3>
    <p class="text-muted">عذراً، حدث خطأ. يرجى المحاولة مرة أخرى.</p>
    <div class="d-flex gap-3 justify-content-center mt-4">
      <a href="javascript:history.back()" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-right me-2"></i> رجوع
      </a>
      <a href="/" class="btn btn-primary">
        <i class="fas fa-home me-2"></i> الرئيسية
      </a>
    </div>
  </div>
</div>
{% endblock %}
